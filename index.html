<!DOCTYPE html>
<html>
<head>
<style>
  @font-face {
    font-family: 'Press Start 2P';
    src: url('assets/fonts/PressStart2P-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  .ticker-wrap {
    width: 100%;
    height: 30px;
    display: flex;
    align-items: center;
    background: #000;
    border-top: 1px solid #ff6a00;
    border-bottom: 1px solid #ff6a00;
  }
  .ticker {
    white-space: nowrap;
    animation: scroll 240s linear infinite;
    color: #ff6a00;
    font-size: 10px;
    padding-left: 100%;
  }
  .score-block { color: #ffcc00; }
  .team-logo {
    width: 16px;
    height: 16px;
    image-rendering: pixelated;
    vertical-align: middle;
    margin: 0 3px;
  }
  .team-logo.low-contrast {
    filter:
      drop-shadow(1px 0 0 #fff)
      drop-shadow(-1px 0 0 #fff)
      drop-shadow(0 1px 0 #fff)
      drop-shadow(0 -1px 0 #fff);
  }
  .team-abbr {
    display: inline-block;
    min-width: 2.5em;
    text-align: center;
    color: #ff6a00;
    font-size: 7px;
    vertical-align: middle;
    margin: 0 2px;
  }
  .ticker-sep {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: #ff6a00;
    margin: 0 8px;
    vertical-align: middle;
  }
  .bases {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    margin: 0 4px;
    vertical-align: middle;
  }
  .base-row {
    display: flex;
    gap: 4px;
  }
  .base {
    width: 4px;
    height: 4px;
    background: #1a1a1a;
    border: 1px solid #ff6a00;
    transform: rotate(45deg);
  }
  .base.lit {
    background: #ffcc00;
    border-color: #ffcc00;
  }
  @keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
  }
</style>
</head>
<body>
  <div class="ticker-wrap">
    <div class="ticker" id="ticker">LOADING SCORES...</div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
